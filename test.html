<!DOCTYPE html>
<html>
<head>
    <title>Rust Chain Governance Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-area { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #connectBtn { background: #e67e22; color: white; }
        #sendBtn { background: #3498db; color: white; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #log { margin-top: 20px; padding: 15px; background: #2c3e50; color: #ecf0f1; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
        .debug { color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 Rust Chain Transaction Test</h2>
    
    <div class="input-group">
        <label>RPC 포트 (Port)</label>
        <input type="number" id="rpcPort" value="10000">
    </div>

    <div class="input-group">
        <label>수신자 주소 (Receiver Address)</label>
        <input type="text" id="targetAddr" value="0x0000000000000000000000000000000000000000">
    </div>

    <div class="input-group">
        <label>송금 수량 (Amount)</label>
        <input type="number" id="amount" value="1000">
    </div>

    <div class="btn-area">
        <button id="connectBtn">1. 지갑 연결</button>
        <button id="sendBtn" disabled>2. 서명 및 전송</button>
    </div>

    <div id="log">상태: 지갑 연결이 필요합니다.</div>
</div>

<script>
    let signer;

    // Helper: 숫자를 8바이트 Big-Endian Uint8Array로 변환 (Rust의 u64 대응)
    function toU64BeBytes(num) {
        const buffer = new ArrayBuffer(8);
        const view = new DataView(buffer);
        view.setBigUint64(0, BigInt(num), false); 
        return new Uint8Array(buffer);
    }

    const logElement = document.getElementById('log');
    function addLog(msg, isDebug = false) {
        const time = new Date().toLocaleTimeString();
        const formattedMsg = `[${time}] ${msg}\n`;
        if (isDebug) {
            logElement.innerHTML += `<span class="debug">${formattedMsg}</span>`;
        } else {
            logElement.innerText += formattedMsg;
        }
        logElement.scrollTop = logElement.scrollHeight;
    }

    document.getElementById('connectBtn').onclick = async () => {
        if (!window.ethereum) return alert("MetaMask를 설치해주세요!");
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const addr = await signer.getAddress();
            logElement.innerText = `✅ 연결 성공: ${addr}\n`;
            document.getElementById('sendBtn').disabled = false;
        } catch (err) {
            logElement.innerText = `❌ 연결 실패: ${err.message}\n`;
        }
    };

    document.getElementById('sendBtn').onclick = async () => {
        const port = document.getElementById('rpcPort').value;
        const baseUrl = `http://localhost:${port}`;

        try {
            const sender = await signer.getAddress();
            const receiver = document.getElementById('targetAddr').value;
            const value = parseInt(document.getElementById('amount').value);

            // 1. 노드에서 최신 논스(Nonce) 조회
            addLog(`⏳ 노드(${port})에서 논스 조회 중...`);
            const nonceRes = await fetch(`${baseUrl}/nonce/${sender}`);
            if (!nonceRes.ok) throw new Error("논스 조회 실패");
            const nonce = await nonceRes.json();
            addLog(`📝 사용 예정 논스: ${nonce}`, true);

            // 2. Payload 구성 (JSON 문자열 -> Bytes)
            const rawPayloadObj = {
                opcode: 2,
                fee: 0,
                data: { ticker: "KRW" }
            };
            const payloadBytes = ethers.utils.toUtf8Bytes(JSON.stringify(rawPayloadObj));

            // 3. 서명용 메시지 생성 (Sender + Receiver + Value + Nonce + Payload)
            const senderBytes = ethers.utils.arrayify(sender);
            const receiverBytes = ethers.utils.arrayify(receiver);
            const valueBytes = toU64BeBytes(value);
            const nonceBytes = toU64BeBytes(nonce);
            
            const finalMessage = ethers.utils.concat([
                senderBytes, 
                receiverBytes, 
                valueBytes, 
                nonceBytes, 
                payloadBytes
            ]);

            // 디버깅용 해시 로그 출력 (논스가 바뀌면 이 값이 바뀌어야 함)
            const msgHash = ethers.utils.keccak256(finalMessage);
            addLog(`🔍 서명 대상 해시: ${msgHash}`, true);

            // 4. 지갑 서명 요청
            addLog("✍️ MetaMask 서명 대기 중...");
            const signature = await signer.signMessage(finalMessage);
            addLog(`🔏 서명 완료: ${signature.substring(0, 20)}...`, true);

            // 5. 트랜잭션 데이터 패키징
            const txData = {
                sender: Array.from(senderBytes),
                receiver: Array.from(receiverBytes),
                value: value,
                nonce: nonce,
                payload: Array.from(payloadBytes),
                signature: Array.from(ethers.utils.arrayify(signature))
            };

            // 6. 노드로 전송
            addLog(`🚀 노드(${port})로 전송 중...`);
            const res = await fetch(`${baseUrl}/transaction`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(txData)
            });

            const resultText = await res.text();
            if (!res.ok) throw new Error(`서버 에러: ${resultText}`);

            addLog(`✅ 전송 성공!\n${resultText}`);

        } catch (err) {
            addLog(`❌ 오류 발생: ${err.message}`);
            console.error(err);
        }
    };
</script>

</body>
</html>
