<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Rust Chain Admin Panel v3</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #0f0f0f; color: #00ff00; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 10px; border: 1px solid #333; }
        .section { background: #222; padding: 15px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid #00ff00; }
        h2, h3 { margin-top: 0; color: #00ff00; text-align: center; }
        .input-group { margin-bottom: 10px; display: flex; align-items: center; }
        label { width: 140px; font-size: 0.9em; color: #888; }
        input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #000; color: #00ff00; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%; }
        #connectBtn { background: #e67e22; color: white; margin-bottom: 20px; }
        .action-btn { background: #27ae60; color: white; margin-top: 10px; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #log { background: #000; color: #00ff00; padding: 15px; border-radius: 5px; height: 250px; overflow-y: auto; font-size: 12px; border: 1px solid #333; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>⛓️ RUST CHAIN TOTAL ADMIN</h2>
    
    <button id="connectBtn">1. WALLET CONNECT (METAMASK)</button>

    <div class="section">
        <h3>💸 TRANSFER (Opcode 0x02)</h3>
        <div class="input-group"><label>To Address</label><input type="text" id="txReceiver" value="0x0000000000000000000000000000000000000000"></div>
        <div class="input-group"><label>Amount</label><input type="text" id="txAmount" value="10.0"></div>
        <div class="input-group"><label>Ticker</label><input type="text" id="txTicker" value="KRW"></div>
        <button class="action-btn" onclick="executeTx(2)" disabled>SEND TRANSACTION</button>
    </div>

    <div class="section">
        <h3>💎 REGISTER TOKEN (Opcode 0x00)</h3>
        <div class="input-group"><label>Token Name</label><input type="text" id="regName" value="Governance Token"></div>
        <div class="input-group"><label>Symbol</label><input type="text" id="regTicker" value="GOV"></div>
        <div class="input-group"><label>Initial Supply</label><input type="text" id="regSupply" value="1000000"></div>
        <button class="action-btn" onclick="executeTx(0)" disabled>REGISTER ASSET</button>
    </div>

    <div class="section">
        <h3>🖨️ MINT TOKEN (Opcode 0x01)</h3>
        <div class="input-group"><label>Target Address</label><input type="text" id="mintReceiver" value="0x0000000000000000000000000000000000000000"></div>
        <div class="input-group"><label>Ticker</label><input type="text" id="mintTicker" value="GOV"></div>
        <div class="input-group"><label>Amount</label><input type="text" id="mintAmount" value="500.0"></div>
        <button class="action-btn" onclick="executeTx(1)" disabled>MINT ASSET</button>
    </div>

    <div id="log">SYSTEM: Waiting for connection...</div>
</div>

<script>
    let userAddress = "";
    const RPC_URL = "http://localhost:10000";

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        log.scrollTop = log.scrollHeight;
    }

    function hexToBytes(hex) {
        hex = hex.replace(/^0x/i, '');
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < hex.length; i += 2) bytes[i/2] = parseInt(hex.substr(i, 2), 16);
        return bytes;
    }

    function bytesToHex(bytes) {
        return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Balance (U256) -> 32 Bytes Big Endian
    function toU256Bytes(amountStr) {
        // 1. 입력값을 소수점 기준으로 나눔
    let [integer, fraction = ""] = amountStr.split(".");
    
    // 2. 소수점 아래를 18자리로 맞춤 (부족하면 0으로 채움)
    fraction = fraction.padEnd(18, "0").slice(0, 18);
    
    // 3. 정수부와 소수부를 합쳐서 하나의 거대한 숫자로 만듦
    const fullAmountStr = integer + fraction;
    const val = BigInt(fullAmountStr);
    
    addLog(`DEBUG: Raw Amount sent to Backend: ${val.toString()}`);
    return hexToBytes(val.toString(16).padStart(64, '0'));
   }

    // u64 -> 8 Bytes Big Endian
    function toU64Bytes(num) {
        const buf = new ArrayBuffer(8);
        new DataView(buf).setBigUint64(0, BigInt(num), false);
        return new Uint8Array(buf);
    }

    document.getElementById('connectBtn').onclick = async () => {
        if (!window.ethereum) return alert("MetaMask not found.");
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        addLog(`CONNECTED: ${userAddress}`);
        document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = false);
    };

    async function executeTx(opcode) {
        try {
            // 1. Get Nonce
            const nonceRes = await fetch(`${RPC_URL}/nonce/${userAddress}`);
            const nonce = await nonceRes.json();

            let receiver = "0x0000000000000000000000000000000000000000";
            let amount = "0";
            let payloadData = {};

            // 백엔드 Schema 구조에 정밀 매칭
            if (opcode === 2) { // handle_transfer
                receiver = document.getElementById('txReceiver').value;
                amount = document.getElementById('txAmount').value;
                payloadData = { ticker: document.getElementById('txTicker').value };
            } 
            else if (opcode === 0) { // register_token
                receiver = "0x0000000000000000000000000000000000000000";
                amount = "0";
                payloadData = { 
                    name: document.getElementById('regName').value,
                    symbol: document.getElementById('regTicker').value,
                    admin: Array.from(hexToBytes(userAddress)), // [중요] expected array of length 20 해결
                    initial_supply: "0x" + bytesToHex(toU256Bytes(document.getElementById('regSupply').value)),
                    decimals: 18
                };
            } 
            else if (opcode === 1) { // handle_mint
                receiver = document.getElementById('mintReceiver').value; // 입금 받을 주소 (to)
                amount = document.getElementById('mintAmount').value;     // 발행량 (value)
                payloadData = { ticker: document.getElementById('mintTicker').value };
            }

            const payloadObj = {
                opcode: opcode,
                fee: "0x0",
                data: payloadData
            };

            // 2. 바이트 직렬화 (20 + 20 + 32 + 8 + 가변)
            const senderBytes = hexToBytes(userAddress);
            const receiverBytes = hexToBytes(receiver);
            const valueBytes = toU256Bytes(amount);
            const nonceBytes = toU64Bytes(nonce);
            const payloadBytes = new TextEncoder().encode(JSON.stringify(payloadObj));

            const message = new Uint8Array(20 + 20 + 32 + 8 + payloadBytes.length);
            let offset = 0;
            message.set(senderBytes, offset); offset += 20;
            message.set(receiverBytes, offset); offset += 20;
            message.set(valueBytes, offset); offset += 32;
            message.set(nonceBytes, offset); offset += 8;
            message.set(payloadBytes, offset);

            // 3. 서명 및 제출
            addLog(`SIGNING: Opcode ${opcode} (Size: ${message.length})...`);
            const sig = await window.ethereum.request({
                method: 'personal_sign',
                params: ["0x" + bytesToHex(message), userAddress],
            });

            const txRequest = {
                sender: Array.from(senderBytes),
                receiver: Array.from(receiverBytes),
                value: "0x" + bytesToHex(valueBytes),
                nonce: nonce,
                payload: Array.from(payloadBytes),
                signature: Array.from(hexToBytes(sig))
            };

            const res = await fetch(`${RPC_URL}/transaction`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(txRequest)
            });

            const txHash = await res.json();
            addLog(`SUCCESS: TxHash ${bytesToHex(new Uint8Array(txHash))}`);

        } catch (err) {
            addLog(`ERROR: ${err.message}`);
            console.error(err);
        }
    }
</script>
</body>
</html>
